<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SSC CGL Quant Syllabus</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-6xl mx-auto p-6">
    
    <h1 class="text-4xl font-bold text-center mb-8 text-cyan-400">
        SSC CGL Quantitative Aptitude
    </h1>

    <div class="grid md:grid-cols-3 sm:grid-cols-2 gap-5">

        <button class="bg-blue-600 p-5 rounded-2xl hover:scale-105 transition">
            Number System
        </button>

        <button class="bg-purple-600 p-5 rounded-2xl hover:scale-105 transition">
            Simplification
        </button>

        <button class="bg-green-600 p-5 rounded-2xl hover:scale-105 transition">
            LCM & HCF
        </button>

        <button class="bg-pink-600 p-5 rounded-2xl hover:scale-105 transition">
            Ratio & Proportion
        </button>

        <button class="bg-orange-600 p-5 rounded-2xl hover:scale-105 transition">
            Percentage
        </button>

        <button class="bg-red-600 p-5 rounded-2xl hover:scale-105 transition">
            Profit & Loss
        </button>

        <button class="bg-indigo-600 p-5 rounded-2xl hover:scale-105 transition">
            Simple Interest
        </button>

        <button class="bg-teal-600 p-5 rounded-2xl hover:scale-105 transition">
            Compound Interest
        </button>

        <button class="bg-yellow-600 p-5 rounded-2xl hover:scale-105 transition">
            Time & Work
        </button>

        <button class="bg-cyan-600 p-5 rounded-2xl hover:scale-105 transition">
            Pipes & Cisterns
        </button>

        <button class="bg-emerald-600 p-5 rounded-2xl hover:scale-105 transition">
            Time Speed Distance
        </button>

        <button class="bg-violet-600 p-5 rounded-2xl hover:scale-105 transition">
            Average
        </button>

        <button class="bg-rose-600 p-5 rounded-2xl hover:scale-105 transition">
            Algebra
        </button>

        <button class="bg-sky-600 p-5 rounded-2xl hover:scale-105 transition">
            Trigonometry
        </button>

        <button class="bg-lime-600 p-5 rounded-2xl hover:scale-105 transition">
            Geometry
        </button>

        <button class="bg-fuchsia-600 p-5 rounded-2xl hover:scale-105 transition">
            Mensuration
        </button>

        <button class="bg-amber-600 p-5 rounded-2xl hover:scale-105 transition">
            Statistics
        </button>

        <button class="bg-gray-700 p-5 rounded-2xl hover:scale-105 transition">
            Data Interpretation
        </button>

    </div>

</div>

</body>
</html>
